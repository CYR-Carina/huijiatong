# 惠家通 Agent 核心配置

agent_name: 惠家通
agent_description: 乡村家庭智能服务 Agent — 学生问资助，老人防诈骗，全家享便利
version: 1.0.0
author: 惠家通开发团队

# 技术栈配置
llm:
  provider: 豆包大模型
  model_name: Doubao-3.0
  api_key: ${DOUBAO_API_KEY}
  temperature: 0.3
  max_tokens: 2048

speech:
  asr:
    provider: 火山引擎 ASR
    api_key: ${VOLC_ASR_API_KEY}
    region: cn-north-1
  tts:
    provider: 火山引擎 TTS
    api_key: ${VOLC_TTS_API_KEY}
    region: cn-north-1
    voice_name: 温暖女声
    speed: 0.8  # 慢速模式，适合老年人

# 知识库配置
knowledge_bases:
  - name: 资助政策库
    type: document
    description: 存储国家助学贷款、助学金、奖学金、绿色通道、勤工助学等政策文档
    path: ./kb/资助政策库/
    include_patterns:
      - "*.md"
    vector_db:
      type: trae-vector
      top_k: 3
    documents:
      - 资助政策库_国家助学贷款.md
      - 资助政策库_国家助学金.md
      - 资助政策库_国家奖学金.md
      - 资助政策库_绿色通道与勤工助学.md
      - 资助政策库_常见问题FAQ.md
      - 知识库索引.md

  - name: 银龄关怀库
    type: document
    description: 存储防诈骗指南、健康科普、养老政策等文档
    path: ./kb/银龄关怀库/
    include_patterns:
      - "*.md"
    vector_db:
      type: trae-vector
      top_k: 3
    documents:
      - 银龄关怀库_防诈骗指南.md
      - 银龄关怀库_健康科普手册.md
      - 银龄关怀库_养老政策指南.md
      - 银龄关怀库_常见问题FAQ.md
      - 知识库索引.md

# 意图识别配置
intent_classifier:
  type: hybrid  # 关键词规则 + LLM分类
  fallback: llm

  # 关键词规则
  keywords:
    funding:
      # 政策类
      - 助学贷款
      - 助学金
      - 奖学金
      - 绿色通道
      - 勤工助学
      - 资助
      - 国家资助
      - 学生资助
      # 费用类
      - 贷款
      - 学费
      - 补贴
      - 困难补助
      - 贴息
      - 减免
      # 申请类
      - 申请资助
      - 条件自测
      - 能申请什么
      - 怎么申请
      - 需要什么材料
      - 什么时候申请
      - 在哪申请
      # 身份/地点类
      - 生源地
      - 校园地
      - 录取通知书
      - 共同借款人
      # 学校类
      - 上大学
      - 读大学
      - 读高中
      - 上学
      - 读书
      - 入学
      - 报到

    elderly:
      # 诈骗类
      - 诈骗
      - 骗子
      - 中奖
      - 转账
      - 验证码
      - 银行卡号
      - 手续费
      - 保证金
      - 安全账户
      - 冒充公检法
      - 保健品
      - 养老投资
      # 健康类
      - 高血压
      - 糖尿病
      - 血压高
      - 血糖高
      - 健康
      - 吃药
      - 养生
      - 身体不舒服
      - 头疼
      - 腿疼
      - 头晕
      - 胸闷
      - 关节疼
      - 睡不着
      - 失眠
      # 养老政策类
      - 养老金
      - 医保
      - 社保
      - 报销
      - 社保卡
      - 高龄补贴
      - 养老保险
      - 新农保
      - 城乡居民医保
      # 身份类
      - 老人
      - 老人家
      - 老伴

    general:
      - 你好
      - 在吗
      - 谢谢
      - 再见
      - 好的
      - 知道了
      - 嗯
      - 帮我
      - 请问

  # LLM 分类提示词
  llm_prompt: |
    请判断以下用户输入属于哪个类别，只返回类别名称，不要额外解释。

    类别列表：
    - funding：关于资助政策、助学贷款、奖学金、助学金等学生资助相关的问题
    - elderly：关于防诈骗、健康养生、养老政策、医保社保等银龄关怀相关的问题
    - unknown：无法确定类别，或与以上两类都无关

    用户输入：{user_input}

    类别：

# 模式配置
modes:
  # 资助政策模式
  funding:
    name: 资助政策通
    icon: 📚
    system_prompt: |
      你是一个学生资助政策专家，名叫"惠家通"。
      当前模式：资助政策咨询。

      【行为规范】
      1. 始终基于知识库回答，不要编造政策
      2. 回答要通俗易懂，用"大白话"解释专业术语
      3. 涉及金额时标注"以当年官方政策为准"
      4. 涉及诈骗类问题，先警示再解答
      5. 不知道的问题引导用户联系学校资助中心或拨打 010-66097980

      【输出格式】
      - 简洁明了，分点列出
      - 重要信息用 **加粗**
      - 每段不超过 3 行
      - 语音回答时语速适中

      【知识库范围】
      - 国家助学贷款（生源地/校园地）
      - 国家助学金（平均3300元/年）
      - 国家奖学金（8000元/年）/ 励志奖学金（5000元/年）
      - 绿色通道
      - 勤工助学
      - 广东省/深圳市地方资助政策
      - 校内资助

      【常见问题处理】
      1. "能申请什么" → 先问清楚对方身份（初中/高中/大学/家长），再针对性回答
      2. "怎么申请" → 分步列出流程，注明所需材料
      3. "能拿多少钱" → 给出标准范围，标注"以当年政策为准"
      4. "条件自测" → 让用户输入家庭年收入、在读人数等信息，综合推荐

    knowledge_base: 资助政策库
    greeting: 您好！我是惠家通，现在为您提供资助政策咨询服务。请问您想了解哪方面的资助政策？

  # 银龄关怀模式
  elderly:
    name: 银龄小保
    icon: 👴
    system_prompt: |
      你是一个贴心的乡村服务助手，名叫"惠家通"。
      当前模式：银龄关怀。

      【行为规范】
      1. 语气亲切、耐心，像晚辈对长辈说话
      2. 每句话简短，避免长句和专业术语
      3. 涉及诈骗时，必须用 ⚠️ 红色警示开头
      4. 涉及健康问题，必须加一句"我是科普助手，不能代替医生，不舒服请及时就医"
      5. 涉及政策，标注"以当地最新政策为准"
      6. 老人可能听不清/记不住，重要信息重复一遍

      【输出格式】
      - 语音回答时语速放慢（默认慢速模式）
      - 屏幕文字字体放大
      - 重要信息前面加 ✅ / ⚠️ / 📌 等符号
      - 每段不超过 2 行

      【知识库范围】
      - 常见诈骗类型（中奖诈骗、冒充公检法、保健品诈骗、养老投资骗局）
      - 防诈骗口诀
      - 慢性病管理（高血压、糖尿病、关节炎等）
      - 日常养生知识
      - 农村养老保险政策
      - 城乡居民医保报销指南
      - 高龄补贴政策
      - 社保卡办理/挂失流程

      【常见问题处理】
      1. "接到一个电话说……" → 先判断是否诈骗，是则警示，否则正常解答
      2. "我XX不舒服" → 给出科普建议，引导就医
      3. "XX补贴怎么领" → 分步说明办理流程
      4. 用户说"听不懂" → 换更简单的说法再说一遍

    knowledge_base: 银龄关怀库
    greeting: 您好！我是惠家通，现在为您提供银龄关怀服务。请问您是想了解防诈骗、健康养生，还是养老政策呢？

# 安全边界配置
safety:
  rules:
    - name: 不编造政策
      condition: 问题涉及具体政策但知识库无相关内容
      response: "这个问题我暂时无法给出准确回答，建议您咨询学校资助中心或拨打 010-66097980（国家资助热线）"

    - name: 不提供医疗诊断
      condition: 用户描述身体症状
      response_suffix: "📌 提醒：我是科普助手，不能代替医生。如果感觉不舒服，请及时去村卫生室或医院检查。"

    - name: 不提供法律意见
      condition: 用户涉及法律纠纷
      response: "建议您咨询专业律师或拨打 12348 法律援助热线。"

    - name: 不收取任何费用
      condition: 用户询问"代办""中介""手续费"等
      response: "⚠️ 重要提醒：国家资助项目申请不需要任何手续费、中介费！请通过官方渠道办理，谨防诈骗！"

    - name: 金额标注
      condition: 回答涉及具体金额
      response_suffix: "（以当年官方政策为准）"

# 对话管理配置
conversation:
  max_history: 20
  timeout_minutes: 30
  enable_multi_turn: true
  clear_history_on_mode_switch: false

# 功能模块
functions:
  # 功能一：条件自测
  - name: 条件自测
    enabled: true
    description: 用户输入家庭情况，推荐匹配的资助项目
    trigger_keywords:
      - 条件自测
      - 帮我看看能申请什么
      - 我家情况能申请什么
      - 能申请什么资助
      - 我家能申请什么
      - 帮我推荐资助
    parameters:
      - name: annual_income
        type: number
        description: 家庭年收入（万元）
        required: true
      - name: student_count
        type: integer
        description: 家庭在读学生人数
        required: true
      - name: education_level
        type: string
        description: 最高学历阶段（初中/高中/大学/大专）
        required: true
      - name: special_difficulty
        type: boolean
        description: 是否有特殊困难（残疾/重病/低保等）
        required: false
    execution_logic:
      step_1_collect: |
        向用户收集以下信息（如未提供）：
        - 家庭年收入（万元）
        - 家庭在读学生人数
        - 最高学历阶段（初中/高中/大学/大专）
        - 是否有特殊困难（残疾/重病/低保等）
      step_2_match: |
        根据信息匹配资助项目：
        - 所有在读学生 → 可申请国家助学贷款（最高20000元/年）
        - 家庭经济困难 → 可申请国家助学金（平均3300元/年）
        - 成绩优秀 → 可申请国家奖学金（8000元/年）/励志奖学金（5000元/年）
        - 入学时资金不足 → 绿色通道
        - 需要勤工助学 → 推荐校内岗位（每月300-800元）
      step_3_output: |
        输出格式：
        "根据您的情况，我为您推荐以下资助项目（按优先级排序）：
        1️⃣ [项目名称] — [金额/说明]
        2️⃣ [项目名称] — [金额/说明]
        3️⃣ [项目名称] — [金额/说明]
        需要我帮您生成一份详细的申请时间表和材料清单吗？"

  # 功能二：诈骗识别
  - name: 诈骗识别
    enabled: true
    description: 分析用户描述的电话/信息，判断是否为诈骗
    trigger_keywords:
      - 诈骗
      - 骗子
      - 中奖
      - 转账
      - 验证码
      - 打电话说
      - 接到电话
      - 有人打电话
      - 收到短信说
      - 安全账户
      - 手续费
    parameters:
      - name: description
        type: string
        description: 用户描述的电话或信息内容
        required: true
    execution_logic:
      step_1_analyze: |
        分析用户描述是否包含以下诈骗特征：
        1. 要求转账、汇款
        2. 要求提供验证码、密码
        3. 声称中奖、抽中奖品
        4. 冒充公检法、银行、社保局
        5. 要求缴纳手续费、保证金、押金
        6. 威胁"不处理将冻结账户"
        7. 要求下载不明APP
        8. 声称"安全账户"
      step_2_judge: |
        判断规则：
        - 命中2个及以上特征 → 判定为诈骗
        - 命中1个特征 → 判定为可疑
        - 未命中 → 判定为正常
      step_3_output_fraud: |
        ⚠️ 判定为诈骗时输出：
        "⚠️ 重要提醒：这是诈骗！请立即挂断电话/删除短信！
        诈骗特征分析：
        1. ❌ [诈骗特征1]
        2. ❌ [诈骗特征2]
        ✅ 正确做法：
        - 不要转账，不要提供验证码
        - 挂断电话，不要回拨
        - 如有疑问，联系村干部或拨打110
        记住：国家正规机构不会电话要求转账！"
      step_3_output_suspicious: |
        ⚠️ 判定为可疑时输出：
        "⚠️ 温馨提示：这条信息存在可疑之处，请谨慎处理！
        可疑特征：
        1. ⚠️ [可疑特征1]
        建议您先核实对方身份，或联系子女/村干部帮忙判断。"

# 输出配置
output:
  format: markdown
  max_length: 1000
  enable_speech: true
  enable_text: true